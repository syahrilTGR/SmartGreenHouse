; --- SMARTGREENHOUSE PROJECT CONFIGURATION ---
; 
; COMMANDS TO COMPILE & UPLOAD (Standard):
;   1. LED Hardware   : pio run -e hardware -t upload
;   2. LED Simulation : pio run -e simulation (Only build, no upload for Wokwi)
;   3. Fan Hardware   : pio run -e hardware_fan -t upload
;   4. Fan Simulation : pio run -e simulation_fan (Only build, no upload for Wokwi)
;
; COMMANDS TO COMPILE & UPLOAD (WINDOWS POWERSHELL - Full Path):
;   1. LED Hardware   : & "$env:USERPROFILE\.platformio\penv\Scripts\pio" run -e hardware -t upload
;   2. LED Simulation : & "$env:USERPROFILE\.platformio\penv\Scripts\pio" run -e simulation
;   3. Fan Hardware   : & "$env:USERPROFILE\.platformio\penv\Scripts\pio" run -e hardware_fan -t upload
;   4. Fan Simulation : & "$env:USERPROFILE\.platformio\penv\Scripts\pio" run -e simulation_fan
;
; COMMANDS TO COMPILE & UPLOAD (WINDOWS CMD - Full Path):
;   1. LED Hardware   : "%USERPROFILE%\.platformio\penv\Scripts\pio" run -e hardware -t upload
;   2. LED Simulation : "%USERPROFILE%\.platformio\penv\Scripts\pio" run -e simulation
;   3. Fan Hardware   : "%USERPROFILE%\.platformio\penv\Scripts\pio" run -e hardware_fan -t upload
;   4. Fan Simulation : "%USERPROFILE%\.platformio\penv\Scripts\pio" run -e simulation_fan
;
; COMMANDS TO COMPILE & UPLOAD (MAC / LINUX - Full Path):
;   1. LED Hardware   : ~/.platformio/penv/bin/pio run -e hardware -t upload
;   2. LED Simulation : ~/.platformio/penv/bin/pio run -e simulation
;   3. Fan Hardware   : ~/.platformio/penv/bin/pio run -e hardware_fan -t upload
;   4. Fan Simulation : ~/.platformio/penv/bin/pio run -e simulation_fan
;
; MONITOR COMMAND (All Platforms):
;   Standard   : pio device monitor -b 115200
;   Windows    : "%USERPROFILE%\.platformio\penv\Scripts\pio" device monitor -b 115200
;   Mac/Linux  : ~/.platformio/penv/bin/pio device monitor -b 115200
; ----------------------------------------------

[env:hardware]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<main_led.cpp>
lib_deps =
  adafruit/DHT sensor library
  adafruit/Adafruit Unified Sensor
  marcoschwartz/LiquidCrystal_I2C
  tzapu/WiFiManager
  blynkkk/Blynk @ ^1.3.2
monitor_speed = 115200

[env:simulation]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<main_sim_led.cpp>
lib_deps =
  adafruit/DHT sensor library
  adafruit/Adafruit Unified Sensor
  marcoschwartz/LiquidCrystal_I2C
  blynkkk/Blynk @ ^1.3.2
monitor_speed = 115200

[env:simulation_fan]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<main_sim_fan.cpp>
lib_deps =
  adafruit/DHT sensor library
  adafruit/Adafruit Unified Sensor
  marcoschwartz/LiquidCrystal_I2C
  blynkkk/Blynk @ ^1.3.2
monitor_speed = 115200

[env:hardware_fan]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<main_fan.cpp>
lib_deps =
  adafruit/DHT sensor library
  adafruit/Adafruit Unified Sensor
  marcoschwartz/LiquidCrystal_I2C
  tzapu/WiFiManager
  blynkkk/Blynk @ ^1.3.2
monitor_speed = 115200